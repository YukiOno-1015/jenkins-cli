name: Quality Checks

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    markdown-lint:
        name: Markdown Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install markdownlint-cli2
              run: npm install --no-save markdownlint-cli2

            - name: Run markdownlint
              run: npx markdownlint-cli2

    workflow-lint:
        name: Workflow Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Lint GitHub Actions workflows
              uses: rhysd/actionlint@v1.7.7

    pipeline-smoke-tests:
        name: Pipeline Smoke Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Run smoke tests
              run: bash .github/scripts/pipeline-smoke-tests.sh

    shell-lint:
        name: Shell Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            # リポジトリ配下のシェルスクリプト全般を shellcheck で検査する
            - name: Run shellcheck
              uses: ludeeus/action-shellcheck@2.0.0
              with:
                  scandir: "."
                  severity: warning
                  ignore_paths: >-
                      .git
